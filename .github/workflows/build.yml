name: Build Tumbler Engine

# 触发条件：当向 main/master 分支 push 代码，或者发起 Pull Request 时触发
on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]

env:
  BUILD_TYPE: Release

jobs:
  build:
    name: ${{ matrix.os }} Build
    runs-on: ${{ matrix.os }}
    
    # 矩阵构建策略：同时在 Ubuntu 和 Windows 下编译
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-22.04, windows-latest]
        include:
          - os: ubuntu-22.04
            vcpkg_triplet: x64-linux
            generator: "Ninja"
          - os: windows-latest
            vcpkg_triplet: x64-windows
            generator: "Visual Studio 17 2022"

    steps:
    # 1. 拉取代码（包括子模块）
    - name: Checkout repository
      uses: actions/checkout@v4
      with:
        submodules: recursive

    # 2. [Linux 专属] 安装基础编译工具和 X11/Wayland 图形运行库依赖 
    # (注意：不使用 apt 安装 Vulkan，以免和官方 SDK 冲突)
    - name: Install System Dependencies (Linux)
      if: runner.os == 'Linux'
      run: |
        sudo apt-get update
        sudo apt-get install -y build-essential cmake ninja-build \
             libx11-dev libxrandr-dev libxinerama-dev \
             libxcursor-dev libxi-dev libxext-dev libwayland-dev \
             libxkbcommon-dev

    # 3. [跨平台] 安装官方 Vulkan SDK (确保包含 glslc 编译器)
    - name: Setup Vulkan SDK
      uses: humbletim/setup-vulkan-sdk@v1.2.1
      with:
        vulkan-query-version: latest

    # 4. [跨平台] 配置 vcpkg 环境 (自带缓存机制)
    - name: Setup vcpkg
      uses: lukka/run-vcpkg@v11
      with:
        vcpkgDirectory: ${{ github.workspace }}/vcpkg

    # 5. 配置 CMake
    - name: Configure CMake
      run: >
        cmake -B ${{ github.workspace }}/build 
        -S ${{ github.workspace }} 
        -G "${{ matrix.generator }}"
        -DCMAKE_BUILD_TYPE=${{ env.BUILD_TYPE }} 
        -DCMAKE_TOOLCHAIN_FILE=${{ github.workspace }}/vcpkg/scripts/buildsystems/vcpkg.cmake 
        -DVCPKG_TARGET_TRIPLET=${{ matrix.vcpkg_triplet }}

    # 6. 编译项目核心代码和着色器
    - name: Build
      run: cmake --build ${{ github.workspace }}/build --config ${{ env.BUILD_TYPE }}

    # 7. [调试用] 发生错误时，打印错误日志 (如果成功编译，这一步会自动跳过)
    - name: Print Error Log on Failure
      if: failure()
      run: cat ${{ github.workspace }}/vcpkg/buildtrees/imgui/install-${{ matrix.vcpkg_triplet }}-dbg-out.log || echo "Log file not found"