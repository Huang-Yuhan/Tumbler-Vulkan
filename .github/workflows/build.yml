name: Build Tumbler Engine

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]

env:
  BUILD_TYPE: Release

jobs:
  build:
    name: ${{ matrix.os }} Build
    runs-on: ${{ matrix.os }}

    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-22.04, windows-latest]
        include:
          # 为不同平台配置不同的构建系统和目标
          - os: ubuntu-22.04
            vcpkg_triplet: x64-linux
            generator: "Ninja"
          - os: windows-latest
            vcpkg_triplet: x64-windows
            generator: "Visual Studio 17 2022"

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          submodules: recursive

      # [Linux 专属] 安装基础编译工具、图形和 Vulkan 运行库依赖
      - name: Install System Dependencies (Linux)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential cmake ninja-build \
            libx11-dev libxrandr-dev libxinerama-dev \
            libxcursor-dev libxi-dev libxext-dev libwayland-dev \
            libxkbcommon-dev libvulkan-dev vulkan-tools \
            vulkan-validationlayers-dev spirv-tools \
            libgl1-mesa-dev

      # [Windows 专属] 安装 Vulkan SDK
      - name: Setup Vulkan SDK (Windows)
        if: runner.os == 'Windows'
        uses: humbletim/setup-vulkan-sdk@v1.2.1
        with:
          vulkan-query-version: latest
          vulkan-components: Vulkan-Headers, Vulkan-Loader

      # [跨平台] 配置 vcpkg 环境
      - name: Setup vcpkg
        uses: lukka/run-vcpkg@v11
        with:
          vcpkgDirectory: ${{ github.workspace }}/vcpkg
          runVcpkgInstall: true

      # 配置 CMake (动态读取矩阵里的 generator)
      - name: Configure CMake
        run: >
          cmake -B ${{ github.workspace }}/build 
          -S ${{ github.workspace }} 
          -G "${{ matrix.generator }}"
          -DCMAKE_BUILD_TYPE=${{ env.BUILD_TYPE }} 
          -DCMAKE_TOOLCHAIN_FILE=${{ github.workspace }}/vcpkg/scripts/buildsystems/vcpkg.cmake 
          -DVCPKG_TARGET_TRIPLET=${{ matrix.vcpkg_triplet }}

      # 编译项目
      - name: Build
        run: cmake --build ${{ github.workspace }}/build --config ${{ env.BUILD_TYPE }}